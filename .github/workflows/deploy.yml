name: Build and Deploy Backend

on:
  push:
    branches:
      - main # Change to 'master' if that is your default branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Grabs your code from the repo
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Logs into GitHub's free registry to store the Docker image
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 3. Reads your Dockerfile, builds it, and saves it
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/termichat-backend:latest

    # 4. Hands the free image over to Azure to run
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'termichat-backend-server' # We will set this exact name in Azure later
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        images: 'ghcr.io/${{ github.repository_owner }}/termichat-backend:latest'
